<!-- To run back end type: mvn spring-boot:run -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Java Compiler MVP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    
    <h1>Java Compiler</h1>

    <textarea id="code">
public class Main {
    public static void main(String[] args) {
        System.out.println("Hello from Java!");
    }
}
    </textarea>

    <div class="buttons">
      <button id="runBtn" class="run">Run Code ▶</button>
      <button id="clearBtn" class="clear">Clear ✖</button>
    </div>

    <h2>Output</h2>
    <pre id="output">Your output will appear here...</pre>

    <footer>
      <p>Developed by Ben Hansen and Victor Dodan</p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
